{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración · Gesicom</title>
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
  <style>
    .admin-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .admin-card-item {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: transform .2s ease, box-shadow .2s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .admin-card-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .admin-card-icon {
      font-size: 3rem;
      text-align: center;
    }
    .admin-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #00610f;
      text-align: center;
      margin: 0;
    }
    .admin-card-desc {
      font-size: 0.9rem;
      color: #6b7280;
      text-align: center;
      margin: 0;
    }
    .welcome {
      background: linear-gradient(135deg, #00610f 0%, #008f17 100%);
      color: #fff;
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }
    .welcome h1 {
      margin: 0 0 0.5rem 0;
      font-size: 2rem;
    }
    .welcome p {
      margin: 0;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" role="navigation" aria-label="Menú de administración">
      <div class="sidebar-brand">
        <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
      </div>
      <nav class="sidebar-nav">
        <a href="{% url 'admin_menu' %}" class="sidebar-link active" aria-current="page">
          <span class="icon">🧭</span>
          <span>Menú</span>
        </a>
        <a href="{% url 'home' %}" class="sidebar-link">
          <span class="icon">🏠</span>
          <span>Inicio</span>
        </a>
        <!-- Proyecciones y Admin Django eliminados por petición -->
      </nav>
    </aside>

    <main class="admin-content" role="main">
      <header class="admin-header">
        <nav class="breadcrumb" aria-label="Ruta">
          <span class="current">Administración</span>
        </nav>
      </header>

      <div class="welcome">
        <h1>Panel de Administración</h1>
        <p>Bienvenido al sistema de gestión de GESICOM. Selecciona una opción del menú para comenzar.</p>
      </div>

      <div class="admin-cards">
        <a href="{% url 'home' %}" class="admin-card-item">
          <div class="admin-card-icon">🏠</div>
          <h2 class="admin-card-title">Inicio</h2>
          <p class="admin-card-desc">Volver a la página principal del sistema</p>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
