<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · Gesicom</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
</head>

<body class="login-body">
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="login-card" role="main">
    <div class="login-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="64" height="64" role="img" aria-label="Icono de usuario">
        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none" />
        <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
      </svg>
    </div>
    {% if role %}
    <h2 class="auth-title">Inicia sesión</h2>
    <p class="auth-subtitle">Como <strong>{{ role|title }}</strong></p>
    {% else %}
    <h2 class="auth-title">Inicia sesión para continuar</h2>
    {% endif %}

    {% if error %}
    <div class="error" role="alert">{{ error }}</div>
    {% endif %}

    <form action="" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="role" value="{{ role|default:'' }}" />
      <div class="username-field">
        <label for="username">Usuario</label>
        <div class="input-row">
          <span class="input-icon left" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <circle cx="8" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none" />
              <path d="M2 20c0-3.5 3.5-5.25 6-5.25" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
              <path d="M16 14l-2 8 8-2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
              <path d="M18 13l3 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
            </svg>
          </span>
          <input class="input" type="text" id="username" name="username" value="{{ username|default:'' }}" autofocus required />
        </div>
      </div>
      <div class="password-field">
        <label for="password">Contraseña</label>
        <div class="input-row">
          <button type="button" id="toggle-password" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </button>
          <input class="input" type="password" id="password" name="password" required minlength="8" maxlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9\W]).{8}$" title="Debe tener exactamente 8 caracteres, al menos una mayúscula y mínimo un número o carácter especial" />
        </div>
      </div>
      <div class="actions">
        <button class="btn" type="submit">Iniciar sesión</button>
      </div>
    </form>

  </main>
  <script>
    (function(){
      var input = document.getElementById('password');
      var btn = document.getElementById('toggle-password');
      if (!input || !btn) return;
      var eyeOpen = '<svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/></svg>';
      var eyeOff = '<svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
      var visible = false;
      btn.addEventListener('click', function(){
        visible = !visible;
        input.type = visible ? 'text' : 'password';
        btn.setAttribute('aria-pressed', visible ? 'true' : 'false');
        btn.innerHTML = visible ? eyeOpen : eyeOff;
      });
    })();
  </script>
</body>

</html>
