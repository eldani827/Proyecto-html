{% load static %}
<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Inicio · GESICOM</title>
    <link href="{% static 'CSS/main.css' %}" rel="stylesheet" />
</head>

<body>
  <header class="topbar topbar-landing">
    <div class="brand">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img">
    </div>
    <nav class="nav">
      <a href="{% url 'home' %}">Inicio</a>
      <a href="{% url 'nosotros' %}">Nosotros</a>
      <a href="{% url 'contacto' %}">Contacto</a>
      <a href="{% url 'ayuda' %}">Ayuda</a>
    </nav>
  </header>

  <main class="main landing">
    <h1 class="title">Bienvenido al portal GESICOM</h1>
    <p class="subtitle">Selecciona tu rol para continuar</p>

    <section class="roles-grid" aria-label="Roles">
      <article class="card landing-card">
        <div class="card-icon">
          <!-- Instructor icon -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a3 3 0 110 6 3 3 0 010-6zm-6 9a3 3 0 013-3h6a3 3 0 013 3v2H6v-2zm-1 5a4 4 0 014-4h8a4 4 0 014 4v2H5v-2z"/></svg>
        </div>
        <h2>Instructor</h2>
        <a class="btn" href="{% url 'login' %}?role=instructor">Ingresar</a>
      </article>

      <article class="card landing-card">
        <div class="card-icon">
          <!-- Investigador icon -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 2a4 4 0 100 8 4 4 0 000-8zm8.32 11.9l3.38 3.38-1.42 1.42-3.38-3.38a6 6 0 10-1.42 1.42l3.84 3.84 2.83-2.83-3.84-3.85z"/></svg>
        </div>
        <h2>Investigador</h2>
        <a class="btn" href="{% url 'login' %}?role=investigador">Ingresar</a>
      </article>

      <article class="card landing-card">
        <div class="card-icon">
          <!-- Dinamizador icon -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a3 3 0 110 6 3 3 0 010-6zM7 11h10v2H13v3h-2v-3H7v-2zm-3 7h16v2H4v-2z"/></svg>
        </div>
        <h2>Dinamizador</h2>
        <a class="btn" href="{% url 'login' %}?role=dinamizador">Ingresar</a>
      </article>

      <article class="card landing-card">
        <div class="card-icon">
          <!-- Coordinador icon -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a3 3 0 110 6 3 3 0 010-6zm-6 9h12v2l-3 2v5H9v-5l-3-2v-2z"/></svg>
        </div>
        <h2>Coordinador</h2>
        <a class="btn" href="{% url 'login' %}?role=coordinador">Ingresar</a>
      </article>
    </section>
  </main>

  <footer class="footer footer-landing" role="contentinfo">
    <div class="footer-left">
      <div class="sena">SENA</div>
      <div class="address">Direccion del sena</div>
    </div>
    <div class="footer-social" aria-label="Redes sociales">
      <a class="circle fb" aria-label="Facebook (SENA)" title="Facebook del SENA" href="https://www.facebook.com/SENA/" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 3h-3a4 4 0 00-4 4v3H6v4h2v7h4v-7h3l1-4h-4V7a1 1 0 011-1h3z"></path>
        </svg>
      </a>
      <a class="circle x" aria-label="X (Twitter) SENA" title="Cuenta X del SENA" href="https://x.com/SENAComunica" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4l16 16" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"></path>
          <path d="M20 4L4 20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"></path>
        </svg>
      </a>
      <a class="circle in" aria-label="LinkedIn (SENA)" title="LinkedIn del SENA" href="https://www.linkedin.com/school/servicio-nacional-de-aprendizaje-sena-/" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="7" cy="8" r="1.7"></circle>
          <path d="M6 10h2.8v8H6z"></path>
          <path d="M10.8 10H14a3 3 0 013 3v5h-2.8v-4.5c0-.8-.6-1.5-1.4-1.5h-2z"></path>
        </svg>
      </a>
    </div>
  </footer>
 </body>
 
 </html>
