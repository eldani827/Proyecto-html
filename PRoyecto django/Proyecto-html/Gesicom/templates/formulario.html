{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
</head>

<body>
  <div class="cuadro">
    <div class="inicio">
      <img src="{% static 'CSS/img/areas.png' %}" alt="Foto descriptiva" width="300">
      <h1>ENVÍO DE EVIDENCIAS GESICOM</h1>
    </div>
    {% if success %}
    <div class="alert-success">Evidencia enviada correctamente.</div>
    {% endif %}
    {% if errors %}
    <div class="alert-error">
      <ul style="margin:0 0 0 18px;">
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    </div>
    {% endif %}
    <br>

    <form action="#" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" value="{{ nombre|default:'' }}" class="input-linea" placeholder="Escribe tu nombre" required> <br>
      <br>

      <label for="opcion">Proyecto:</label>
      <select id="opcion" name="opcion">
        <option value="">-- Selecciona --</option>
        <option value="LEM" {% if proyecto == 'LEM' %}selected{% endif %}>LEM</option>
        <option value="GIVIT" {% if proyecto == 'GIVIT' %}selected{% endif %}>GIVIT</option>
        <option value="ACAF" {% if proyecto == 'ACAF' %}selected{% endif %}>ACAF</option>
        <option value="DEPOS" {% if proyecto == 'DEPOS' %}selected{% endif %}>DEPOS</option>
        <option value="IFPI" {% if proyecto == 'IFPI' %}selected{% endif %}>IFPI</option>
        <option value="TUGA" {% if proyecto == 'TUGA' %}selected{% endif %}>TUGA</option>
      </select>
      <br><br>
      <fieldset>
        <legend><strong>Tipo de evidencias:</strong></legend>

        <label>
          <input type="checkbox" name="evidencias" value="planeacion" {% if 'planeacion' in tipos %}checked{% endif %}>
          Planeación
        </label><br>

        <label>
          <input type="checkbox" name="evidencias" value="ejecucion" {% if 'ejecucion' in tipos %}checked{% endif %}>
          Ejecución
        </label><br>

        <label>
          <input type="checkbox" name="evidencias" value="evaluacion" {% if 'evaluacion' in tipos %}checked{% endif %}>
          Evaluación
        </label><br>

        <label>
          <input type="checkbox" name="evidencias" value="informe_final" {% if 'informe_final' in tipos %}checked{% endif %}>
          Informe final
        </label>
      </fieldset>
      <br><br>

      <label for="fecha">Fecha:</label>
      <input type="date" id="fecha" name="fecha">

      <br><br>

      <label for="archivo">Subir archivo:</label>
      <input type="file" id="archivo" name="archivo"><br><br>

      <label for="linkArchivo">Link del archivo:</label>
      <input type="url" id="linkArchivo" name="linkArchivo" value="{{ linkArchivo|default:'' }}" placeholder="https://..." style="width: 300px;"><br><br>

      <label for="observaciones">Observaciones:</label><br>
      <textarea id="observaciones" name="observaciones" rows="4" cols="50"
        placeholder="Escribe tus observaciones aquí...">{{ observaciones|default:'' }}</textarea> <br> <br>

      <input type="submit" value="Enviar" class="btn btn-primary">
  <script src="{% static 'js/script.js' %}"></script>
  </div>
  <script src="{% static 'script.js' %}"></script>
</body>

</html>
