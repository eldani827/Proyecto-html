{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Perfil - GESICOM{% endblock %}

{% block extra_head %}
<link href="{% static 'CSS/main.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
    <div class="window">
        <div class="window-header">
            <div class="circles">
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
            </div>
        </div>

        <div class="content">
            <header>
                <!-- Logo en formato JPEG -->
                <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="GESICOM" class="logo">
                <nav>
                    <a href="{% url 'inicio' %}">Inicio</a>
                    <a href="{% url 'evidencia' %}">Evidencia</a>
                    <a href="{% url 'logout' %}">Cerrar sesión</a>
                </nav>
            </header>

            <main>
                <h1>Editar Perfil</h1>
                <form method="post">
                    {% csrf_token %}
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" value="{{ user.first_name }}">

                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" value="{{ user.last_name }}">

                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" value="{{ user.email }}">

                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena">

                    <button type="submit">Guardar</button>
                </form>
            </main>
        </div>
    </div>
{% endblock %}
