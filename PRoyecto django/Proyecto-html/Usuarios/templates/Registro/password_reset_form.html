{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña · Usuarios</title>
  <link rel="stylesheet" href="{% static 'usuarios/main.css' %}">
</head>
<body>
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="card">
    <p class="subtitle">Ingresa tu correo y te enviaremos instrucciones.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.email.label_tag }}
      {{ form.email }}
      <div class="actions">
        <button class="btn" type="submit">Enviar</button>
      </div>
    </form>
  </main>
</body>
</html>
