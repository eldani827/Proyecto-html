<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Perfil</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'GESICOM/CSS/editar.css' %}">
</head>

<body>

<div class="window">

    <div class="window-header">
        <div class="circles">
            <span class="circle"></span>
            <span class="circle"></span>
            <span class="circle"></span>
        </div>
    </div>

    <div class="content">

        <header>
            <img src="{% static 'GESICOM/img/gesicom.jpeg' %}" alt="GESICOM" class="logo">

            <nav>
                <a href="#">Inicio</a>
                <a href="#">Evidencia</a>
                <a href="#">Perfil</a>
                <a href="#">Cerrar sesión</a>
            </nav>
        </header>

        <main>
            <h1>Editar Perfil</h1>

            <form method="post" novalidate>
                {% csrf_token %}

                <label for="id_first_name">Nombre</label>
                <input id="id_first_name" name="first_name" type="text">

                <label for="id_last_name">Apellido</label>
                <input id="id_last_name" name="last_name" type="text">

                <label for="id_email">Correo Electrónico</label>
                <input id="id_email" name="email" type="email">

                <label for="id_password">Contraseña</label>
                <input id="id_password" name="password" type="password">

                <button type="submit">Guardar</button>

            </form>
        </main>

    </div>
</div>

</body>
</html>
