{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-light">
	<div class="container-fluid">
		<a class="navbar-brand" href="{% url 'home' %}">GESICOM</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>

		<div class="collapse navbar-collapse" id="mainNavbar">
			<ul class="navbar-nav me-auto mb-2 mb-lg-0">
				<li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Inicio</a></li>
				<li class="nav-item"><a class="nav-link" href="{% url 'nosotros' %}">Nosotros</a></li>
				<li class="nav-item"><a class="nav-link" href="{% url 'contacto' %}">Contacto</a></li>
				<li class="nav-item"><a class="nav-link" href="{% url 'ayuda' %}">Ayuda</a></li>
				<li class="nav-item"><a class="nav-link" href="{% url 'portal' %}">Portal</a></li>
			</ul>

			<ul class="navbar-nav ms-auto mb-2 mb-lg-0">
				{% if user.is_authenticated %}
					<li class="nav-item"><a class="nav-link" href="{% url 'usuario' %}">{{ user.get_full_name|default:user.username }}</a></li>
					<li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Salir</a></li>
				{% else %}
					<li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Iniciar sesión</a></li>
					<li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Registrarse</a></li>
				{% endif %}
			</ul>
		</div>
	</div>
</nav>
