{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear nueva contraseña · Gesicom</title>
  <link rel="stylesheet" href="{% static 'CSS/login.css' %}">
</head>
<body>
  <main class="card">
    <div class="brand"><div class="logo"></div><h1>Gesicom</h1></div>
    {% if validlink %}
      <p class="subtitle">Ingresa tu nueva contraseña</p>
      <form method="post">
        {% csrf_token %}
        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}
        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}
        <div class="actions">
          <button class="btn" type="submit">Actualizar contraseña</button>
        </div>
      </form>
    {% else %}
      <p class="error">Enlace inválido o expirado.</p>
    {% endif %}
  </main>
  </body>
  </html>
