<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · Gesicom</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --input: #1f2937;
      --accent: #4f46e5;
      --accent-2: #6366f1;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; display: grid; place-items: center; min-height: 100vh;
      background: radial-gradient(60rem 60rem at 10% -10%, #1e293b 0%, var(--bg) 40%),
                  radial-gradient(60rem 60rem at 90% 110%, #1e293b 0%, var(--bg) 40%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
    }
    .card {
      width: 100%; max-width: 420px; background: linear-gradient(180deg, #111827, #0b1220);
      border: 1px solid #1f2937; border-radius: 16px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.45);
    }
    .brand { display: flex; align-items: center; gap: .6rem; margin-bottom: 1.25rem; }
    .brand .logo { width: 28px; height: 28px; border-radius: 8px; background: conic-gradient(from 180deg, var(--accent), var(--accent-2)); box-shadow: 0 0 24px rgba(79,70,229,.35); }
    .brand h1 { font-size: 1.25rem; margin: 0; letter-spacing: .3px; }
    .subtitle { margin: 0 0 1.5rem; color: var(--muted); font-size: .95rem; }
    form { display: grid; gap: .9rem; }
    label { font-size: .82rem; color: var(--muted); }
    .input {
      width: 100%; background: var(--input); color: var(--text); border: 1px solid #273244;
      border-radius: 10px; padding: .8rem .9rem; outline: none; transition: border-color .15s ease, box-shadow .15s ease;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79,70,229,.15); }
    .actions { display: flex; align-items: center; justify-content: space-between; margin-top: .5rem; }
    .btn {
      appearance: none; border: none; cursor: pointer; padding: .8rem 1rem; border-radius: 10px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: white; font-weight: 600;
      box-shadow: 0 12px 24px rgba(79,70,229,.35); transition: transform .08s ease, box-shadow .15s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 32px rgba(79,70,229,.45); }
    .helper { font-size: .85rem; color: var(--muted); }
    .error { background: rgba(239,68,68,.1); color: #fecaca; border: 1px solid rgba(239,68,68,.35); padding: .65rem .8rem; border-radius: 10px; margin-bottom: .75rem; }
    .footer { margin-top: 1rem; text-align: center; font-size: .8rem; color: var(--muted); }
    a { color: #a5b4fc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
  </head>
<body>
  <main class="card" role="main">
    <div class="brand" aria-label="Gesicom">
      <div class="logo" aria-hidden="true"></div>
      <h1>Gesicom</h1>
    </div>
    <p class="subtitle">Inicia sesión para continuar</p>

    {% if error %}
      <div class="error" role="alert">{{ error }}</div>
    {% endif %}

    <form action="" method="post" novalidate>
      {% csrf_token %}
      <div>
        <label for="username">Usuario</label>
        <input class="input" type="text" id="username" name="username" value="{{ username|default:'' }}" autofocus required />
      </div>
      <div>
        <label for="password">Contraseña</label>
        <input class="input" type="password" id="password" name="password" required />
      </div>
      <div class="actions">
        <button class="btn" type="submit">Iniciar sesión</button>
        <span class="helper">¿Olvidaste tu contraseña?</span>
      </div>
    </form>

    <p class="footer">¿No tienes cuenta? Contacta al administrador.</p>
  </main>
</body>
</html>
