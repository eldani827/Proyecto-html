{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña · Gesicom</title>
  <link rel="stylesheet" href="{% static 'instructor/main.css' %}">
  <style>.helper a{color:#2b6cb0;text-decoration:none}</style>
</head>
<body class="login-body">
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="login-card" role="main">
    <h2 class="auth-title">Restablecer contraseña</h2>
    <p class="auth-subtitle">Ingresa tu correo para recibir un código</p>
    <form method="post">
      {% csrf_token %}
      <div class="email-field">
        {{ form.email.label_tag }}
        <div class="input-row">
          <span class="input-icon left" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M3 5h18v14H3z" stroke="currentColor" stroke-width="2" fill="none" />
              <path d="M3 7l9 6 9-6" stroke="currentColor" stroke-width="2" fill="none" />
            </svg>
          </span>
          <input id="reset-email" class="input" type="email" name="email" placeholder="Usuario@gmail.com" required />
        </div>
      </div>
      <div class="actions actions-center" style="gap:.5rem;">
        <button class="btn" type="button" id="send-code">Enviar código</button>
      </div>
    </form>

    <div class="password-field">
      <label for="code">Código recibido</label>
      <div class="input-row">
        <span class="input-icon left" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
            <path d="M6 12l4 4 8-8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
          </svg>
        </span>
        <input id="code" class="input" type="text" inputmode="numeric" pattern="\d{6}" placeholder="123456" />
      </div>
    </div>

    <div class="password-field">
      <label for="new1">Nueva contraseña</label>
      <div class="input-row">
        <button type="button" id="toggle-new1" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
            <path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <input id="new1" class="input" type="password" minlength="8" maxlength="8" placeholder="Ej: Daniel21 (letras y números)" />
      </div>
    </div>

    <div class="password-field">
      <label for="new2">Confirmar contraseña</label>
      <div class="input-row">
        <button type="button" id="toggle-new2" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
            <path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <input id="new2" class="input" type="password" minlength="8" maxlength="8" placeholder="Repite la contraseña" />
      </div>
    </div>
    <div id="reset-errors" class="error" role="alert" style="display:none;"></div>
    <div class="actions actions-center" style="gap:.5rem;">
      <button class="btn" type="button" id="apply-reset">Cambiar contraseña</button>
    </div>
    <div class="actions actions-center" style="margin-top:1rem;">
      <a class="helper" href="{% url 'login' %}">Volver a iniciar sesión</a>
    </div>
  </main>
</body>
<script>
  (function(){
    const toggle = (btnId, inputId) => {
      const btn = document.getElementById(btnId);
      const inp = document.getElementById(inputId);
      if(!btn || !inp) return;
      const svg = btn.querySelector('svg');
      btn.addEventListener('click', () => {
        const isPassword = inp.type === 'password';
        inp.type = isPassword ? 'text' : 'password';
        btn.setAttribute('aria-pressed', isPassword ? 'true' : 'false');
        if(!svg) return;
        if(isPassword){
          svg.innerHTML = '<path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>';
        } else {
          svg.innerHTML = '<path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>';
        }
      });
    };

    toggle('toggle-new1','new1');
    toggle('toggle-new2','new2');

    const getCsrf = () => {
      const el = document.querySelector('input[name="csrfmiddlewaretoken"]');
      if(el && el.value) return el.value;
      const m = document.cookie.match(/csrftoken=([^;]+)/);
      return m ? m[1] : '';
    };

    const sendBtn = document.getElementById('send-code');
    const applyBtn = document.getElementById('apply-reset');
    const email = document.getElementById('reset-email');
    const code = document.getElementById('code');
    const new1 = document.getElementById('new1');
    const new2 = document.getElementById('new2');
    const err = document.getElementById('reset-errors');

    const showError = (msg) => { err.style.display='block'; err.innerHTML = '<ul><li>' + msg + '</li></ul>'; };
    const clearError = () => { err.style.display='none'; err.innerHTML = ''; };
    const validPass = (p) => /^(?=.*[A-Z])(?=.*\d)[A-Za-z\d]{8}$/.test(p);

    if(sendBtn){
      sendBtn.addEventListener('click', async () => {
        clearError();
        try{
          const res = await fetch('/api/olvide_password/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'X-CSRFToken': getCsrf(),
            },
            body: 'email=' + encodeURIComponent(email.value || '')
          });
          const j = await res.json();
          if(!res.ok) { showError(j.error || 'Error enviando código'); }
          else { showError('Código enviado al correo.'); }
        } catch(e) { showError('Error de red'); }
      });
    }

    if(applyBtn){
      applyBtn.addEventListener('click', async () => {
        clearError();
        if(new1.value !== new2.value){ showError('Las contraseñas no coinciden'); return; }
        if(!validPass(new1.value)){ showError('La contraseña debe tener 8 caracteres, incluir mayúscula y número (solo letras y números)'); return; }
        try{
          const res = await fetch('/api/restablecer_password/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'X-CSRFToken': getCsrf(),
            },
            body: 'email=' + encodeURIComponent(email.value || '') +
                  '&codigo=' + encodeURIComponent(code.value || '') +
                  '&password=' + encodeURIComponent(new1.value || '')
          });
          const j = await res.json();
          if(!res.ok){ showError(j.error || 'No se pudo cambiar la contraseña'); }
          else { window.location.href = "{% url 'password_reset_complete' %}"; }
        } catch(e){ showError('Error de red'); }
      });
    }
  })();
</script>
</html>
