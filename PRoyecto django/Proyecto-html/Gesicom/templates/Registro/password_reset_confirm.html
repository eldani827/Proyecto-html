{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear nueva contraseña · Gesicom</title>
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
</head>
<body>
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="card">
    {% if validlink %}
      <p class="subtitle">Ingresa tu nueva contraseña</p>
      <form method="post">
        {% csrf_token %}
        <div class="password-field">
          {{ form.new_password1.label_tag }}
          <div class="input-row">
            <button type="button" id="toggle-new1" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
              <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
                <path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
              </svg>
            </button>
            {{ form.new_password1 }}
          </div>
        </div>
        <div class="password-field">
          {{ form.new_password2.label_tag }}
          <div class="input-row">
            <button type="button" id="toggle-new2" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
              <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
                <path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
              </svg>
            </button>
            {{ form.new_password2 }}
          </div>
        </div>
        <div class="actions">
          <button class="btn" type="submit">Actualizar contraseña</button>
        </div>
      </form>
      <script>
        (function(){
          function setup(btnId, inputId){
            var input = document.getElementById(inputId);
            var btn = document.getElementById(btnId);
            if(!input || !btn) return;
            var eyeOpen = '<svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/></svg>';
            var eyeOff = '<svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
            btn.addEventListener('click', function(){
              var visible = input.type === 'text';
              input.type = visible ? 'password' : 'text';
              btn.innerHTML = visible ? eyeOff : eyeOpen;
              btn.setAttribute('aria-pressed', (!visible).toString());
            });
          }
          // Los IDs por defecto de los campos del form de Django
          setup('toggle-new1', 'id_new_password1');
          setup('toggle-new2', 'id_new_password2');
        })();
      </script>
    {% else %}
      <p class="error">Enlace inválido o expirado.</p>
    {% endif %}
  </main>
  </body>
  </html>
