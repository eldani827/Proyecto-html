{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse · Usuarios</title>
  <link rel="stylesheet" href="{% static 'usuarios/main.css' %}">
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#39A900" />
  <link rel="icon" href="{% static 'CSS/img/gesicom.jpeg' %}" />
  <link rel="apple-touch-icon" href="{% static 'CSS/img/gesicom.jpeg' %}" />
  <meta name="robots" content="noindex" />
  <meta name="description" content="Registrarse en el portal Usuarios" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="generator" content="Usuarios" />
</head>
<body class="login-body">
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="login-card" role="main">
    {% if role %}
      <h2 class="auth-title">Registrarse</h2>
      <p class="auth-subtitle">Para <strong>{{ role|title }}</strong></p>
    {% else %}
      <h2 class="auth-title">Regístrate para continuar</h2>
    {% endif %}

    {% if errors %}
    <div class="error" role="alert">
      <ul>
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    </div>
    {% endif %}

    <form action="" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="role" value="{{ role|default:'' }}" />
      <div class="username-field">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" class="input" placeholder="Tu usuario" value="{{ username|default:'' }}" required />
      </div>
      <div class="username-field">
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" class="input" placeholder="tu@correo.com" value="{{ email|default:'' }}" required />
      </div>
      <div class="password-field">
        <label for="password1">Contraseña</label>
        <input id="password1" name="password1" type="password" class="input" minlength="8" maxlength="8" pattern="^(?=.*[A-Z])(?=.*\d)[A-Za-z\d]{8}$" required />
      </div>
      <div class="password-field">
        <label for="password2">Confirmar contraseña</label>
        <input id="password2" name="password2" type="password" class="input" minlength="8" maxlength="8" pattern="^(?=.*[A-Z])(?=.*\d)[A-Za-z\d]{8}$" required />
      </div>
      <div class="actions actions-center">
        <button type="submit" class="btn">Crear cuenta</button>
        <a href="{% url 'login' %}?role={{ role|default:'' }}" class="helper">¿Ya tienes cuenta? Inicia sesión</a>
      </div>
    </form>
  </main>
</body>
</html>
