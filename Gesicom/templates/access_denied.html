{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso denegado · GESICOM</title>
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
</head>
<body class="login-body">
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="login-card" role="main">
    <h2 class="auth-title">Acceso denegado</h2>
    <p class="auth-subtitle">No tienes permisos para acceder a esta sección.</p>
    <div class="actions actions-center">
      <a href="{% url 'home' %}" class="btn">Ir al inicio</a>
      <a href="{% url 'login' %}" class="btn secondary">Iniciar sesión con otro rol</a>
    </div>
  </main>
</body>
</html>
