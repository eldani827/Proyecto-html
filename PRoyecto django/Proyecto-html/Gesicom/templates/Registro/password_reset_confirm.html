{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear nueva contraseña · Gesicom</title>
  <link rel="stylesheet" href="{% static 'usuarios/main.css' %}">
</head>
<body>
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="login-card" role="main">
    <h2 class="auth-title">Crear nueva contraseña</h2>
    <p class="auth-subtitle">Ingresa y confirma tu nueva contraseña</p>
    <form method="post">
      {% csrf_token %}
      <div class="password-field">
        <label for="id_new_password1">Nueva contraseña</label>
        <div class="input-row">
          <button type="button" id="toggle-new1" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M1 12s4-7 11-7c3 0 5.7 1  7.8 2.6" stroke="#1a73e8" stroke-width="2" fill="none"/>
              <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="#1a73e8" stroke-width="2" fill="none"/>
              <path d="M3 3l18 18" stroke="#1a73e8" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </button>
          <input type="password" name="new_password1" id="id_new_password1" class="input password-with-icon" required minlength="8" maxlength="8" />
        </div>
      </div>
      <div class="password-field">
        <label for="id_new_password2">Confirmar contraseña</label>
        <div class="input-row">
          <button type="button" id="toggle-new2" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M1 12s4-7 11-7c3 0 5.7 1  7.8 2.6" stroke="#1a73e8" stroke-width="2" fill="none"/>
              <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="#1a73e8" stroke-width="2" fill="none"/>
              <path d="M3 3l18 18" stroke="#1a73e8" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </button>
          <input type="password" name="new_password2" id="id_new_password2" class="input password-with-icon" required minlength="8" maxlength="8" />
        </div>
      </div>
      {% if form.errors %}
      <div class="error" role="alert">
        <ul>
          {% for field, errs in form.errors.items %}
            {% for e in errs %}<li>{{ e }}</li>{% endfor %}
          {% endfor %}
        </ul>
      </div>
      {% endif %}
      <div class="actions actions-center">
        <button class="btn" type="submit">Actualizar contraseña</button>
      </div>
    </form>
  </main>
  <script>
    (function(){
      function setupToggle(btnId, inputId){
        var btn = document.getElementById(btnId);
        var input = document.getElementById(inputId);
        if(!btn || !input) return;
        var visible = false;
        btn.addEventListener('click', function(){
          visible = !visible;
          input.type = visible ? 'text' : 'password';
          btn.setAttribute('aria-pressed', visible ? 'true' : 'false');
        });
      }
      setupToggle('toggle-new1','id_new_password1');
      setupToggle('toggle-new2','id_new_password2');
    })();
  </script>
</body>
</html>
