<!-- template principal -->

{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portal GESICOM{% endblock %}</title>
    <link href="{% static 'CSS/main.css' %}" rel="stylesheet" />
</head>
<body>

{% block content %}
<header class="topbar">
    <div class="brand">
        <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img">
    </div>
    <nav class="nav">
        <a href="{% url 'home' %}">Inicio</a>
        <a href="{% url 'evidencia' %}">Evidencia</a>
        <a href="{% url 'evidencias_list' %}">Listado</a>
        <a href="{% url 'perfil' %}">Perfil</a>
        <a href="{% url 'logout' %}">Cerrar Sesión</a>
    </nav>
</header>

<main class="main">
    <h1 class="title">Bienvenido al portal GESICOM</h1>
    <p class="subtitle">Selecciona tu rol para continuar</p>

    <section class="roles-grid" aria-label="Roles">
        {% include 'roles_cards.html' %}
    </section>
</main>

<!-- ===== FOOTER LIMPIO ===== -->
<footer class="footer footer-landing">
  <div class="footer-left">
      <div class="sena">SENA</div>
      <div class="address">© {{ now "Y" }} - Todos los derechos reservados</div>
  </div>
