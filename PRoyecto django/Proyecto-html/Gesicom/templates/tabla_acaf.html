{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GESICOM - ACAF</title>
<link rel="stylesheet" href="{% static 'CSS/ACAF.css' %}">

</head>

<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="GESICOM" class="logo">
      </div>
      <nav>
        <a href="#">Inicio</a>
        <a href="#">editar</a>
        <a href="#">guardar</a>
        <a href="#">Cerrar sesión</a>
      </nav>
    </header>

    <main>
      <div class="titulo">
        <h2>ACAF</h2>
      </div>

      <form method="post" enctype="multipart/form-data" action="">
        {% csrf_token %}
        <table>
          <thead>
            <tr>
              <th>NOMBRE</th>
              <th>FECHA DE EVIDENCIA</th>
              <th>EVIDENCIA</th>
              <th>AÑADIR COMENTARIO</th>
              <th>ESTADO DE EVIDENCIA</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <label for="nombre">Nombre</label>
                <input id="nombre" type="text" name="nombre" placeholder="Ingrese su nombre">
              </td>
              <td>
                <label for="fecha">Fecha</label>
                <input id="fecha" type="date" name="fecha">
              </td>
              <td>
                <label for="evidencia">Evidencia</label>
                <input id="evidencia" type="file" name="evidencia" accept=".pdf,.doc,.docx,.jpg,.png">
              </td>
              <td>
                <label for="comentario">Comentario</label>
                <textarea id="comentario" name="comentario" maxlength="500" placeholder="Escriba su comentario (máx. 500 caracteres)"></textarea>
              </td>
              <td>
                <label for="estado">Estado</label>
                <input id="estado" type="text" name="estado" placeholder="Estado de evidencia">
              </td>
            </tr>
            <tr>
              <td>
                <label for="nombre2">Nombre</label>
                <input id="nombre2" type="text" name="nombre2" placeholder="Ingrese su nombre">
              </td>
              <td>
                <label for="fecha2">Fecha</label>
                <input id="fecha2" type="date" name="fecha2">
              </td>
              <td>
                <label for="evidencia2">Evidencia</label>
                <input id="evidencia2" type="file" name="evidencia2" accept=".pdf,.doc,.docx,.jpg,.png">
              </td>
              <td>
                <label for="comentario2">Comentario</label>
                <textarea id="comentario2" name="comentario2" maxlength="500" placeholder="Escriba su comentario (máx. 500 caracteres)"></textarea>
              </td>
              <td>
                <label for="estado2">Estado</label>
                <input id="estado2" type="text" name="estado2" placeholder="Estado de evidencia">
              </td>
            </tr>
            <tr>
              <td>
                <label for="nombre3">Nombre</label>
                <input id="nombre3" type="text" name="nombre3" placeholder="Ingrese su nombre">
              </td>
              <td>
                <label for="fecha3">Fecha</label>
                <input id="fecha3" type="date" name="fecha3">
              </td>
              <td>
                <label for="evidencia3">Evidencia</label>
                <input id="evidencia3" type="file" name="evidencia3" accept=".pdf,.doc,.docx,.jpg,.png">
              </td>
              <td>
                <label for="comentario3">Comentario</label>
                <textarea id="comentario3" name="comentario3" maxlength="500" placeholder="Escriba su comentario (máx. 500 caracteres)"></textarea>
              </td>
              <td>
                <label for="estado3">Estado</label>
                <input id="estado3" type="text" name="estado3" placeholder="Estado de evidencia">
              </td>
            </tr>
          </tbody>
        </table>

        <div class="boton-guardar">
          <button type="submit">Guardar Evidencias</button>
        </div>
      </form>
    </main>
  </div>
</body>

</html>
