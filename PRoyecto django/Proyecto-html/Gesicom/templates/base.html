<!--template principal-->

{% extends 'base.html' %}
{% load static %}

{% block title %}Portal GESICOM{% endblock %}

{% block content %}
<header class="topbar">
    <div class="brand">
        <img src="{% static 'img/icono.jpeg' %}" alt="Logo GESICOM" class="logo-img">
    </div>
    <nav class="nav">
        <a href="{% url 'home' %}">Inicio</a>
        <a href="{% url 'evidencia' %}">Evidencia</a>
        <a href="{% url 'perfil' %}">Perfil</a>
        <a href="{% url 'logout' %}">Cerrar Sesion</a>
    </nav>
</header>

<main class="main">
    <h1 class="title">Bienvenido al portal GESICOM</h1>
    <p class="subtitle">Selecciona tu rol para continuar</p>

    <section class="roles-grid" aria-label="Roles">
        <!-- El resto del contenido se mantiene exactamente igual -->
        {% include 'roles_cards.html' %}
    </section>
</main>

<footer class="footer">
    <div class="footer-left">
        <div class="sena">SENA</div>
    </div>
    <div class="footer-social">
        <span class="circle">f</span>
        <span class="circle">t</span>
        <span class="circle">in</span>
    </div>
</footer>
{% endblock %}
