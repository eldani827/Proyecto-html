<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · Gesicom</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'CSS/login.css' %}">
</head>

<body>
  <main class="card" role="main">
    <div class="brand" aria-label="Gesicom">
      <div class="logo" aria-hidden="true"></div>
      <h1>Gesicom</h1>
    </div>
    {% if role %}
    <p class="subtitle">Inicia sesión como <strong>{{ role|title }}</strong></p>
    {% else %}
    <p class="subtitle">Inicia sesión para continuar</p>
    {% endif %}

    {% if error %}
    <div class="error" role="alert">{{ error }}</div>
    {% endif %}

    <form action="" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="role" value="{{ role|default:'' }}" />
      <div>
        <label for="username">Usuario</label>
        <input class="input" type="text" id="username" name="username" value="{{ username|default:'' }}" autofocus
          required />
      </div>
      <div>
        <label for="password">Contraseña</label>
        <input class="input" type="password" id="password" name="password" required />
      </div>
      <div class="actions">
        <button class="btn" type="submit">Iniciar sesión</button>
        <a class="helper" href="{% url 'password_reset' %}">¿Olvidaste tu contraseña?</a>
      </div>
    </form>

    <p class="footer">¿No tienes cuenta? <a href="{% url 'register' %}{% if role %}?role={{ role }}{% endif %}">Regístrate</a> o <a href="{% url 'portal' %}">volver al portal</a></p>
  </main>
</body>

</html>
