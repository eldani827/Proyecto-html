{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contraseña actualizada · Gesicom</title>
  <link rel="stylesheet" href="{% static 'usuarios/main.css' %}">
</head>
<body>
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="login-card" role="main">
    <h2 class="auth-title">Contraseña actualizada</h2>
    <p class="auth-subtitle">Ya puedes iniciar sesión</p>
    <div class="actions actions-center">
      <a class="btn" href="{% url 'login' %}">Ir al login</a>
    </div>
    <script>
      setTimeout(function(){ window.location.href = '{% url 'login' %}'; }, 1800);
    </script>
  </main>
</body>
</html>
