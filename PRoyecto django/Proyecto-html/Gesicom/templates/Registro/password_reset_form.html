{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña · Gesicom</title>
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
  <style>.helper a{color:#2b6cb0;text-decoration:none}</style>
</head>
<body>
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="card">
    <p class="subtitle">Ingresa tu correo para restablecer la contraseña</p>
    <form method="post">
      {% csrf_token %}
      <div class="email-field">
        {{ form.email.label_tag }}
        <div class="input-row">
          <span class="input-icon left" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M3 5h18v14H3z" stroke="currentColor" stroke-width="2" fill="none" />
              <path d="M3 7l9 6 9-6" stroke="currentColor" stroke-width="2" fill="none" />
            </svg>
          </span>
          <input class="input" type="email" name="email" required />
        </div>
      </div>
      <div class="actions">
        <button class="btn" type="submit">Enviar enlace</button>
        <a class="helper" href="{% url 'login' %}">Volver a iniciar sesión</a>
      </div>
    </form>
  </main>
</body>
</html>
