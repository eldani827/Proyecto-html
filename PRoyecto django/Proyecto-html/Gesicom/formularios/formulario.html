<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Envío de Evidencias GESICOM</title>

<!-- ENLACE AL CSS -->
<link rel="stylesheet" href="/Gesicom/static/formularios/estilos.css">

</head>

<body>

<!-- ENCABEZADO -->
<div class="inicio">
  <img src="logo.png" alt="Logo">
  <h2>ENVÍO DE EVIDENCIAS GESICOM</h2>
</div>

<div class="cuadro">
<form>

<label for="nombre"><b>Nombre:</b></label>
<input type="text" id="nombre" name="nombre">

<label for="opcion"><b>Proyecto</b></label>
<select id="opcion" name="proyecto">
<option>Seleccione</option>
<option>Proyecto 1</option>
<option>Proyecto 2</option>
<option>Proyecto 3</option>
</select>

<label><b>Tipo de Evidencia</b></label><br>

<input type="checkbox" id="planeacion">
<label for="planeacion">Planeación</label><br>

<input type="checkbox" id="ejecucion">
<label for="ejecucion">Ejecución</label><br>

<input type="checkbox" id="evaluacion">
<label for="evaluacion">Evaluación</label><br>

<input type="checkbox" id="informe">
<label for="informe">Informe Final</label><br><br>

<label for="fecha"><b>Fecha</b></label>
<input type="date" id="fecha">

<label for="archivo"><b>Subir Archivo</b></label>
<input type="file" id="archivo">

<label for="linkArchivo"><b>Link de archivo</b></label>
<input type="url" id="linkArchivo">

<label for="observaciones"><b>Observaciones</b></label>
<textarea id="observaciones" rows="4"></textarea>

<input type="submit" value="ENVIAR">

<a href="formulario_envio.html"></a>
</form>
</div>
</body>
</html>
