{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta · GESICOM</title>
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#0d8a43" />
  <link rel="icon" href="{% static 'CSS/img/gesicom.jpeg' %}" />
  <link rel="apple-touch-icon" href="{% static 'CSS/img/gesicom.jpeg' %}" />
  <meta name="robots" content="noindex" />
  <meta name="description" content="Crear cuenta en el portal GESICOM" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="generator" content="GESICOM" />
</head>
<body class="login-body">
  <main class="login-card" role="main">
    <div class="login-brand" aria-label="GESICOM">
      <img class="logo-img" src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" />
      <h1>GESICOM</h1>
    </div>
    {% if role %}
    <p class="login-subtitle">Crear cuenta para <strong>{{ role|title }}</strong></p>
    {% else %}
    <p class="login-subtitle">Crea tu cuenta para continuar</p>
    {% endif %}

    {% if errors %}
    <div class="error" role="alert">
      <ul>
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    </div>
    {% endif %}

    <form action="" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="role" value="{{ role|default:'' }}" />
      <div>
        <label for="username">Usuario</label>
        <input class="input" type="text" id="username" name="username" value="{{ username|default:'' }}" autofocus required />
      </div>
      <div>
        <label for="email">Correo</label>
        <input class="input" type="email" id="email" name="email" value="{{ email|default:'' }}" required />
      </div>
      <div>
        <label for="password1">Contraseña</label>
        <input class="input" type="password" id="password1" name="password1" required />
      </div>
      <div>
        <label for="password2">Repetir contraseña</label>
        <input class="input" type="password" id="password2" name="password2" required />
      </div>
      <div class="actions">
        <button class="btn" type="submit">Registrarse</button>
      </div>
    </form>
  </main>
</body>
</html>
