{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse · GESICOM</title>
  <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#0d8a43" />
  <link rel="icon" href="{% static 'CSS/img/gesicom.jpeg' %}" />
  <link rel="apple-touch-icon" href="{% static 'CSS/img/gesicom.jpeg' %}" />
  <meta name="robots" content="noindex" />
  <meta name="description" content="Registrarse en el portal GESICOM" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="generator" content="GESICOM" />
</head>
<body class="login-body">
  <header class="topbar topbar-auth">
    <div class="brand-left">
      <img src="{% static 'CSS/img/gesicom.jpeg' %}" alt="Logo GESICOM" class="logo-img" />
    </div>
  </header>
  <main class="login-card" role="main">
    {% if role %}
      <h2 class="auth-title">Registrarse</h2>
      <p class="auth-subtitle">Para <strong>{{ role|title }}</strong></p>
    {% else %}
      <h2 class="auth-title">Regístrate para continuar</h2>
    {% endif %}

    {% if errors %}
    <div class="error" role="alert">
      <ul>
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    </div>
    {% endif %}

    <form action="" method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="role" value="{{ role|default:'' }}" />
      <div class="username-field">
        <label for="username">Usuario</label>
        <div class="input-row">
          <span class="input-icon left" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <circle cx="8" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none" />
              <path d="M2 20c0-3.5 3.5-5.25 6-5.25" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
              <path d="M16 14l-2 8 8-2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
              <path d="M18 13l3 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
            </svg>
          </span>
          <input class="input" type="text" id="username" name="username" value="{{ username|default:'' }}" autofocus required />
        </div>
      </div>
      <div class="email-field">
        <label for="email">Correo</label>
        <div class="input-row">
          <span class="input-icon left" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M3 5h18v14H3z" stroke="currentColor" stroke-width="2" fill="none" />
              <path d="M3 7l9 6 9-6" stroke="currentColor" stroke-width="2" fill="none" />
            </svg>
          </span>
          <input class="input" type="email" id="email" name="email" value="{{ email|default:'' }}" required />
        </div>
      </div>
      <div class="password-field">
        <label for="password1">Contraseña</label>
        <div class="input-row">
          <button type="button" id="toggle-password1" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </button>
          <input class="input" type="password" id="password1" name="password1" required minlength="8" maxlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9\W]).{8}$" title="Debe tener exactamente 8 caracteres, al menos una mayúscula y mínimo un número o carácter especial" />
        </div>
      </div>
      <div class="password-field">
        <label for="password2">Repetir contraseña</label>
        <div class="input-row">
          <button type="button" id="toggle-password2" class="toggle-password left" aria-label="Mostrar u ocultar contraseña" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="32" height="32" role="img" aria-hidden="true">
              <path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </button>
          <input class="input" type="password" id="password2" name="password2" required minlength="8" maxlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9\W]).{8}$" title="Debe tener exactamente 8 caracteres, al menos una mayúscula y mínimo un número o carácter especial" />
        </div>
      </div>
      <div class="actions actions-center">
        <button class="btn" type="submit">Registrarse</button>
      </div>
    </form>
  </main>
  <script>
    (function(){
      function setupToggle(btnId, inputId){
        var input = document.getElementById(inputId);
        var btn = document.getElementById(btnId);
        if(!input || !btn) return;
        var eyeOpen = '<svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/></svg>';
        var eyeOff = '<svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path d="M1 12s4-7 11-7c3 0 5.7 1 7.8 2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M23 12s-4 7-11 7c-3 0-5.7-1-7.8-2.6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 3l18 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
        btn.addEventListener('click', function(){
          var visible = input.type === 'text';
          input.type = visible ? 'password' : 'text';
          btn.innerHTML = visible ? eyeOff : eyeOpen;
          btn.setAttribute('aria-pressed', (!visible).toString());
        });
      }
      setupToggle('toggle-password1','password1');
      setupToggle('toggle-password2','password2');
    })();
  </script>
</body>
</html>
