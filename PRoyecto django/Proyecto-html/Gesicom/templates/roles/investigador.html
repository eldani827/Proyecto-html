{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Investigador · Gesicom{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'CSS/roles.css' %}">
</head>
<body>
  <header class="role-header">
    <h1>{% block header %}Panel de Investigador{% endblock %}</h1>
    <nav>
      <a href="{% url 'portal' %}" class="link">Volver al portal</a>
      <a href="{% url 'login' %}?role=investigador" class="link">Volver a iniciar sesión</a>
    </nav>
  </header>
  <main class="container">
    <p>{% block content %}Contenido del rol Investigador.{% endblock %}</p>
  </main>
</body>
</html>
